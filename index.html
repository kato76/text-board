<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>見守り文字ボード</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: #000;
  color: #fff;
  font-family: sans-serif;
  overflow: hidden;
}

#start {
  width: 100vw;
  height: 100vh;
  font-size: 8vw;
  background: #000;
  color: #fff;
  border: none;
}

#app {
  display: none;
  width: 100vw;
  height: 100vh;
  box-sizing: border-box;
  padding: 2vh 3vw;
  flex-direction: column;
  gap: 2vh;
}

.panel {
  border: 2px solid #666;
  border-radius: 16px;
  padding: 2vh 2vw;
  box-sizing: border-box;
  overflow: hidden;
}

.label {
  font-size: 3.2vw;
  color: #bbb;
  margin-bottom: 1vh;
}

#familyBox {
  flex: 0 0 23vh;
  background: #111;
  border-color: #888;
}

#familyText {
  font-size: 9vw;
  line-height: 1.25;
  white-space: pre-wrap;
  word-break: break-word;
  text-align: center;
}

/* 天気は2行になるので、通常メッセージより少し小さくして下に余白を作る */
#familyText.weatherText {
  font-size: min(7.2vw, 4.4vh);
  line-height: 1.15;
  padding-bottom: 1vh;
}

#liveBox {
  flex: 0 0 38vh;
  background: #001018;
  border-color: #4da3ff;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

#liveText {
  flex: 1;
  font-size: 10.8vw;
  line-height: 1.2;
  text-align: center;
  white-space: pre-wrap;
  word-break: break-word;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
}

#historyBox {
  flex: 1 1 auto;
  background: #111;
}

#historyList {
  margin: 0;
  padding-left: 1.2em;
  font-size: 4.2vw;
  line-height: 1.45;
  white-space: pre-wrap;
}

#status {
  position: absolute;
  right: 2vw;
  bottom: 1vh;
  font-size: 2.8vw;
  color: #888;
}
</style>
</head>
<body>

<button id="start">画面をタップしてください</button>

<div id="app">
  <div id="familyBox" class="panel">
    <div class="label">ご家族から</div>
    <div id="familyText"></div>
  </div>

  <div id="liveBox" class="panel">
    <div class="label">いまのことば</div>
    <div id="liveText"></div>
  </div>

  <div id="historyBox" class="panel">
    <div class="label">さっきのことば</div>
    <ul id="historyList"></ul>
  </div>
</div>

<div id="status"></div>

<script>
const POST_URL = "https://script.google.com/macros/s/AKfycbwTDREKD4-sJAY-TmBdmnPSXtQBjNgaKKv_RI-APXlPxHseCNED9NkEPHOv5RipFDlH/exec";
const GET_URL  = "https://script.google.com/macros/s/AKfycbwTDREKD4-sJAY-TmBdmnPSXtQBjNgaKKv_RI-APXlPxHseCNED9NkEPHOv5RipFDlH/exec";

const IDLE_MS = 60 * 1000;
const HISTORY_MAX = 4;
const SEND_COOLDOWN_MS = 2500;
const WEATHER_CACHE_MS = 10 * 60 * 1000;

let recognition = null;
let micPaused = false;

let lastFamilyId = "";
let currentFamilyRow = 1;
let lastSentText = "";
let lastSentTime = 0;
let idleTimer = null;
let idleClockTimer = null;
let isIdleMode = true;

let lastWeatherText = "";
let lastWeatherTime = 0;

const startBtn = document.getElementById("start");
const app = document.getElementById("app");
const familyTextEl = document.getElementById("familyText");
const liveTextEl = document.getElementById("liveText");
const historyListEl = document.getElementById("historyList");
const statusEl = document.getElementById("status");

const historyItems = [];

startBtn.onclick = () => {
  startBtn.style.display = "none";
  app.style.display = "flex";
  showIdleDateTime();
  pollSheet();
  startMic();
};

function getIdleDateTimeText() {
  const now = new Date();
  const week = ["日", "月", "火", "水", "木", "金", "土"];

  const y = now.getFullYear();
  const m = now.getMonth() + 1;
  const d = now.getDate();
  const w = week[now.getDay()];
  const hh = String(now.getHours()).padStart(2, "0");
  const mm = String(now.getMinutes()).padStart(2, "0");

  return `${y}年\n${m}月${d}日（${w}）\n${hh}：${mm}`;
}

function showIdleDateTime() {
  isIdleMode = true;
  liveTextEl.innerText = getIdleDateTimeText();
}

function startIdleClock() {
  if (idleClockTimer) clearInterval(idleClockTimer);

  idleClockTimer = setInterval(() => {
    if (isIdleMode) {
      showIdleDateTime();
    }
  }, 1000);
}

function normalizeText(text) {
  return (text || "")
    .replace(/\s+/g, " ")
    .replace(/。/g, "。\n")
    .replace(/！/g, "！\n")
    .replace(/？/g, "？\n")
    .replace(/\n+/g, "\n")
    .trim();
}

function isNgWord(text) {
  const s = String(text || "").trim();

  const ngPatterns = [
    /死ね/i, /しね/i, /シネ/i, /しねぇ/i, /しねえ/i,
    /シネェ/i, /シネエ/i,
    /殺す/i, /ころす/i, /消えろ/i,
    /ばか/i, /バカ/i,
    /うるさ/i, /うるさい/i,
    /うんこ/i, /ウンコ/i,
    /ちんこ/i, /チンコ/i,
    /ちんちん/i, /チンチン/i,
    /おっぱい/i, /オッパイ/i,
    /おまんこ/i, /オマンコ/i,
    /まんこ/i,/マンコ/i,
    /おしっこ/i, /オシッコ/i
  ];

  return ngPatterns.some(p => p.test(s));
}

function shortenText(text, max = 24) {
  const t = (text || "").replace(/\n/g, " ").trim();
  return t.length > max ? t.slice(0, max) + "…" : t;
}

function splitIntoChunks(text, max = 22) {
  const raw = normalizeText(text).replace(/\n/g, " ");
  if (!raw) return [];

  const parts = raw.split(/(?<=[。！？])/).map(s => s.trim()).filter(Boolean);
  const chunks = [];

  for (const part of parts) {
    if (part.length <= max) {
      chunks.push(part);
    } else {
      for (let i = 0; i < part.length; i += max) {
        chunks.push(part.slice(i, i + max));
      }
    }
  }
  return chunks.filter(Boolean);
}

function showStatus(msg) {
  statusEl.textContent = msg || "";
}

function showLiveText(msg) {
  isIdleMode = false;
  liveTextEl.innerText = msg || "";
}

async function getWeatherText() {
  const now = Date.now();

  if (lastWeatherText && (now - lastWeatherTime) < WEATHER_CACHE_MS) {
    return lastWeatherText;
  }

  const url =
    "https://api.open-meteo.com/v1/forecast" +
    "?latitude=34.6762" +
    "&longitude=135.4866" +
    "&current=temperature_2m,weather_code" +
    "&hourly=precipitation_probability" +
    "&forecast_days=1" +
    "&timezone=Asia%2FTokyo";

  try {
    const res = await fetch(url);
    const data = await res.json();

    const temp = Math.round(data.current.temperature_2m);
    const code = data.current.weather_code;

    const weatherMap = {
      0: "快晴",
      1: "晴れ",
      2: "くもり",
      3: "くもり",
      45: "霧",
      48: "霧",
      51: "小雨",
      53: "小雨",
      55: "雨",
      56: "雨",
      57: "雨",
      61: "雨",
      63: "雨",
      65: "強い雨",
      66: "雨",
      67: "強い雨",
      71: "雪",
      73: "雪",
      75: "強い雪",
      80: "にわか雨",
      81: "にわか雨",
      82: "強い雨",
      95: "雷雨",
      96: "雷雨",
      99: "雷雨"
    };

    const weather = weatherMap[code] || "天気";

    // 現在の降水確率より、これから先の降水確率が上がる時だけ表示を強める
    let popNow = 0;
    let maxFuturePop = 0;
    let popDiff = 0;

    if (data.hourly && data.hourly.time && data.hourly.precipitation_probability) {
      const currentHour = new Date();
      currentHour.setMinutes(0, 0, 0);

      let currentIndex = -1;

      for (let i = 0; i < data.hourly.time.length; i++) {
        const t = new Date(data.hourly.time[i]);
        if (t.getTime() === currentHour.getTime()) {
          currentIndex = i;
          break;
        }
      }

      if (currentIndex >= 0) {
        popNow = Number(data.hourly.precipitation_probability[currentIndex] || 0);

        const futurePops = [];
        for (let i = currentIndex + 1; i <= currentIndex + 3 && i < data.hourly.precipitation_probability.length; i++) {
          futurePops.push(Number(data.hourly.precipitation_probability[i] || 0));
        }

        if (futurePops.length > 0) {
          maxFuturePop = Math.max(...futurePops);
          popDiff = maxFuturePop - popNow;
        }
      }
    }

    let rainText = "";

    if (popDiff >= 20 && maxFuturePop >= 50) {
      rainText = "、雨強く";
    } else if (popDiff >= 10 && maxFuturePop >= 40) {
      rainText = "、雨近い";
    }

    lastWeatherText = `大阪市西区の天気\n${weather}　${temp}°C${rainText}`;
    lastWeatherTime = now;

    return lastWeatherText;
  } catch (e) {
    return lastWeatherText || "大阪市西区の天気\n取得できません";
  }
}

async function showFamilyText(msg) {
  let t = String(msg || "").trim();

  // 通常は天気用の小さめ表示を解除
  familyTextEl.classList.remove("weatherText");

  t = t.replace(/^（和）/, "").trim();

  if (t === "さっきの言葉消す" || t === "さっきの言葉を消す") {
    historyItems.length = 0;
    historyListEl.innerHTML = "";
    return;
  }

  if (t === "-") {
    familyTextEl.innerText = "";
    return;
  }

  if (t === "天気") {
    familyTextEl.classList.add("weatherText");
    familyTextEl.innerText = await getWeatherText();
    return;
  }

  familyTextEl.innerText = t ? "（和）" + t : "";
}

function addHistory(text) {
  const one = shortenText(text, 24);
  if (!one) return;
  if (isNgWord(one)) return;
  if (historyItems[0] === one) return;

  historyItems.unshift(one);
  if (historyItems.length > HISTORY_MAX) {
    historyItems.length = HISTORY_MAX;
  }

  historyListEl.innerHTML = "";
  historyItems.forEach(item => {
    const li = document.createElement("li");
    li.textContent = item;
    historyListEl.appendChild(li);
  });
}

function resetIdleTimer() {
  if (idleTimer) clearTimeout(idleTimer);
  idleTimer = setTimeout(() => {
    showIdleDateTime();
    sendDisplayUpdate(getIdleDateTimeText(), currentFamilyRow);
  }, IDLE_MS);
}

async function sendDisplayUpdate(text, row) {
  if (isNgWord(text)) {
    console.log("NG display_update blocked:", text);
    return;
  }

  try {
    await fetch(POST_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({
        action: "display_update",
        text: text || "",
        row: row || 1
      })
    });
  } catch (err) {
    console.log("DISPLAY POST error:", err);
  }
}

async function sendSpeechToSheet(text) {
  if (isNgWord(text)) {
    console.log("NG speech sheet blocked:", text);
    return { status: "BLOCKED_NG", row: 1 };
  }

  try {
    const res = await fetch(POST_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({
        text: text
      })
    });

    return await res.json();
  } catch (err) {
    console.log("POST error:", err);
    return { status: "NG", row: 1 };
  }
}

async function pollSheet() {
  try {
    const res = await fetch(GET_URL + "?t=" + Date.now());
    const data = await res.json();

    showStatus("接続中");

    if (data.row) {
      currentFamilyRow = Number(data.row) || 1;
    }

    if (data.text !== undefined) {
      await showFamilyText(data.text || "");
    }

    if (data.id !== undefined && data.id !== lastFamilyId) {
      lastFamilyId = data.id || "";
    }
  } catch (err) {
    console.log("GET error:", err);
    showStatus("通信待ち");
  }

  setTimeout(pollSheet, 1000);
}

function startMic() {
  const S = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!S) {
    showLiveText("この端末は\n音声認識に対応していません");
    return;
  }

  recognition = new S();
  recognition.lang = "ja-JP";
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onresult = async (e) => {
    let interimParts = [];
    let finalParts = [];

    for (let i = e.resultIndex; i < e.results.length; i++) {
      const txt = (e.results[i][0].transcript || "").trim();
      if (!txt) continue;

      if (e.results[i].isFinal) {
        finalParts.push(txt);
      } else {
        interimParts.push(txt);
      }
    }

    const interimText = normalizeText(interimParts.join(" "));
    const finalText = normalizeText(finalParts.join(" "));

    if (interimText) {
      if (isNgWord(interimText)) {
        console.log("NG interim blocked:", interimText);
        return;
      }

      showLiveText(interimText);
      resetIdleTimer();
      sendDisplayUpdate(interimText, currentFamilyRow);
    }

    if (finalText) {
      const now = Date.now();

      if (isNgWord(finalText)) {
        console.log("NG final blocked:", finalText);
        return;
      }

      if (finalText.length <= 1) {
        showLiveText(finalText);
        resetIdleTimer();
        return;
      }

      if (finalText !== lastSentText || (now - lastSentTime) >= SEND_COOLDOWN_MS) {
        lastSentText = finalText;
        lastSentTime = now;

        const chunks = splitIntoChunks(finalText, 22);

        for (const chunk of chunks) {
          if (isNgWord(chunk)) {
            console.log("NG chunk blocked:", chunk);
            continue;
          }

          showLiveText(chunk);
          addHistory(chunk);
          resetIdleTimer();

          await sendDisplayUpdate(chunk, currentFamilyRow);
          await sendSpeechToSheet(chunk);
        }
      } else {
        showLiveText(finalText);
        resetIdleTimer();
        await sendDisplayUpdate(finalText, currentFamilyRow);
      }
    }
  };

  recognition.onerror = (e) => {
    console.log("Speech error:", e);
    showStatus("音声待ち");
  };

  recognition.onend = () => {
    if (!micPaused) {
      setTimeout(startMic, 300);
    }
  };

  try {
    recognition.start();
    showStatus("聞き取り中");
  } catch (err) {
    console.log("Recognition start error:", err);
  }
}

startIdleClock();
resetIdleTimer();
</script>
</body>
</html>
