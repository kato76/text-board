<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>見守り文字ボード</title>
<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:sans-serif;
}
#start{
  width:100vw;
  height:100vh;
  font-size:8vw;
  background:black;
  color:white;
  border:none;
}
#text{
  display:none;
  width:100vw;
  height:100vh;
  font-size:12vw;
  text-align:center;
  padding:5vw;
  line-height:1.2;
  white-space:pre-wrap;
  box-sizing:border-box;
  align-items:center;
  justify-content:center;
}
</style>
</head>
<body>

<button id="start">画面をタップしてください</button>
<div id="text"></div>

<script>
const POST_URL = "https://script.google.com/macros/s/AKfycbx0bAxQf6PXr-UeyfqxoBPXGP6Pb_NIq1i6yCdMVle1RsX9fpmkqc3RxELOQ0C4sy-J/exec";
const GET_URL  = "https://script.google.com/macros/s/AKfycbx0bAxQf6PXr-UeyfqxoBPXGP6Pb_NIq1i6yCdMVle1RsX9fpmkqc3RxELOQ0C4sy-J/exec";

const IDLE_MESSAGE = "何かしゃべってください。\n2回くらい";
const IDLE_MS = 10 * 60 * 1000;

let lastId = "";
let recognition = null;
let micPaused = false;
let lastSentText = "";
let lastSentTime = 0;

let currentMode = "idle";
let currentWaText = "";
let currentTabletText = "";
let currentDisplayRow = 1;   // 今画面に対応する行
let idleTimer = null;

const startBtn = document.getElementById("start");
const t = document.getElementById("text");

startBtn.onclick = () => {
  startBtn.style.display = "none";
  t.style.display = "flex";
  showIdleMessage();
  startMic();
  pollSheet();
};

function showText(msg){
  t.innerText = msg || "";
}

async function sendDisplayUpdate(text, row){
  try{
    await fetch(POST_URL, {
      method: "POST",
      headers: {"Content-Type":"text/plain;charset=utf-8"},
      body: JSON.stringify({
        action: "display_update",
        text: text || "",
        row: row || 1
      })
    });
  }catch(err){
    console.log("DISPLAY POST error:", err);
  }
}

function showIdleMessage(){
  currentMode = "idle";
  currentTabletText = "";
  showText(IDLE_MESSAGE);
}

async function showWaMessage(msg, row){
  currentMode = "wa";
  currentWaText = msg || "";
  currentDisplayRow = row || 1;
  showText(currentWaText);
  await sendDisplayUpdate(currentWaText, currentDisplayRow);
}

async function showTabletMessage(msg, row){
  currentMode = "tablet";
  currentTabletText = msg || "";
  currentDisplayRow = row || 1;
  showText(currentTabletText);
  await sendDisplayUpdate(currentTabletText, currentDisplayRow);
}

function resetIdleTimer(){
  if(idleTimer){
    clearTimeout(idleTimer);
  }

  idleTimer = setTimeout(() => {
    currentTabletText = "";
    showIdleMessage();
  }, IDLE_MS);
}

async function pollSheet(){
  try{
    const res = await fetch(GET_URL + "?t=" + Date.now());
    const data = await res.json();

    if(data.id !== undefined && data.id !== lastId){
      lastId = data.id;

      if(data.text){
        await showWaMessage(data.text, data.row || 1);
      }
    }
  }catch(err){
    console.log("GET error:", err);
  }

  setTimeout(pollSheet, 500);
}

async function sendSpeechToSheet(text){
  try{
    const res = await fetch(POST_URL, {
      method: "POST",
      headers: {"Content-Type":"text/plain;charset=utf-8"},
      body: JSON.stringify({
        text: text
      })
    });

    const data = await res.json();
    return data.row || currentDisplayRow || 1;
  }catch(err){
    console.log("POST error:", err);
    return currentDisplayRow || 1;
  }
}

function startMic(){
  const S = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!S){
    showText("この端末は音声認識に対応していません");
    return;
  }

  recognition = new S();
  recognition.lang = "ja-JP";
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onresult = async e => {
    let interimText = "";
    let finalText = "";

    for(let i = e.resultIndex; i < e.results.length; i++){
      const txt = e.results[i][0].transcript.trim();
      if(e.results[i].isFinal){
        finalText += txt;
      }else{
        interimText += txt;
      }
    }

    // 途中表示は、今の会話対象行に仮表示
    if(interimText){
      showText(interimText);
      resetIdleTimer();
    }

    // 確定したら、先にシートへ送り、返ってきた正しい行番号で表示更新
    if(finalText){
      const now = Date.now();
      resetIdleTimer();

      if(finalText !== lastSentText || (now - lastSentTime) >= 3000){
        lastSentText = finalText;
        lastSentTime = now;

        const row = await sendSpeechToSheet(finalText);
        await showTabletMessage(finalText, row);
      } else {
        // 重複抑制で送らない場合でも、現在行にだけ表示
        showText(finalText);
      }
    }
  };

  recognition.onerror = e => {
    console.log("Speech error:", e);
  };

  recognition.onend = () => {
    if(!micPaused){
      setTimeout(startMic, 200);
    }
  };

  try{
    recognition.start();
  }catch(err){
    console.log("Recognition start error:", err);
  }
}

resetIdleTimer();
</script>
</body>
</html>
