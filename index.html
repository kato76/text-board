<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>見守り文字ボード</title>
<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:sans-serif;
}
#start{
  width:100vw;
  height:100vh;
  font-size:8vw;
  background:black;
  color:white;
  border:none;
}
#text{
  display:none;
  width:100vw;
  height:100vh;
  font-size:12vw;
  text-align:center;
  padding:5vw;
  line-height:1.2;
  white-space:pre-wrap;
  box-sizing:border-box;
  align-items:center;
  justify-content:center;
}
</style>
</head>
<body>

<button id="start">画面をタップしてください</button>
<div id="text"></div>

<script>
const POST_URL = "https://script.google.com/macros/s/AKfycbwGgvo4ftlRRyD5bghKJoOrdEkB9KbpbCgTiRXrW2i_eZUz71sBo3F4XRs02Fi896JT/exec";
const GET_URL  = "https://script.google.com/macros/s/AKfycbwGgvo4ftlRRyD5bghKJoOrdEkB9KbpbCgTiRXrW2i_eZUz71sBo3F4XRs02Fi896JT/exec";

let lastId = "";
let recognition = null;
let micPaused = false;
let lastSentText = "";
let lastSentTime = 0;

const startBtn = document.getElementById("start");
const t = document.getElementById("text");

startBtn.onclick = () => {
  startBtn.style.display = "none";
  t.style.display = "flex";
  t.innerText = "待機中";
  startMic();
  pollSheet();
};

function showText(msg){
  t.innerText = msg || "";
}

async function pollSheet(){
  try{
    const res = await fetch(GET_URL + "?t=" + Date.now());
    const data = await res.json();

    if(data.id !== undefined && data.id !== lastId){
      lastId = data.id;
      showText(data.text || "");
    }
  }catch(err){
    console.log("GET error:", err);
  }

  setTimeout(pollSheet, 1000);
}

async function sendToSheet(text){
  try{
    await fetch(POST_URL, {
      method: "POST",
      headers: {"Content-Type":"text/plain;charset=utf-8"},
      body: JSON.stringify({
        text: text
      })
    });
  }catch(err){
    console.log("POST error:", err);
  }
}

function startMic(){
  const S = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!S){
    showText("この端末は音声認識に対応していません");
    return;
  }

  recognition = new S();
  recognition.lang = "ja-JP";
  recognition.continuous = true;
  recognition.interimResults = false;

  recognition.onresult = e => {
    const result = e.results[e.results.length - 1];
    if(!result.isFinal) return;

    const text = result[0].transcript.trim();
    if(!text) return;

    const now = Date.now();
    if(text === lastSentText && (now - lastSentTime) < 3000){
      return;
    }

    lastSentText = text;
    lastSentTime = now;

    showText(text);
    sendToSheet(text);
  };

  recognition.onerror = e => {
    console.log("Speech error:", e);
  };

  recognition.onend = () => {
    if(!micPaused){
      setTimeout(startMic, 500);
    }
  };

  try{
    recognition.start();
  }catch(err){
    console.log("Recognition start error:", err);
  }
}
</script>
</body>
</html>
