<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>見守り文字ボード</title>
<style>
body{margin:0;background:black;color:white;font-family:sans-serif;}
#start{width:100vw;height:100vh;font-size:8vw;background:black;color:white;border:none;}
#text{display:none;width:100vw;height:100vh;font-size:6vw;text-align:center;
padding:5vw;line-height:1.2;white-space:pre-wrap;
display:flex;align-items:center;justify-content:center;}
</style>
</head>
<body>

<button id="start">画面をタップしてください</button>
<div id="text"></div>

<script>

const POST_URL = "https://script.google.com/macros/s/AKfycbydEP83WxaTh9MlviRld1j5Q0-mwj3VFvWjaj4opZ4edCO1zxPxgkgs-gsZXHiSJbgm/exec";
const GET_URL  = "https://script.google.com/macros/s/AKfycbydEP83WxaTh9MlviRld1j5Q0-mwj3VFvWjaj4opZ4edCO1zxPxgkgs-gsZXHiSJbgm/exec";

let lastRow = -1;
let recognition = null;
let micPaused = false;

const t = document.getElementById("text");

document.getElementById("start").onclick = () => {
  document.getElementById("start").style.display = "none";
  t.style.display = "flex";
  t.innerText = "待機中";
  startMic();
  pollSheet();
};

function showText(msg){
  if(!msg) return;
  t.innerText = msg;
}

function pollSheet(){
  fetch(GET_URL + "?t=" + Date.now())
    .then(r=>r.json())
    .then(data=>{
      if(data.row > lastRow){
        lastRow = data.row;
        showText(data.text);
      }
    })
    .catch(()=>{});
  setTimeout(pollSheet,500);
}

function sendToSheet(text){
  fetch(POST_URL,{
    method:"POST",
    mode:"no-cors",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      text:text,
      type:"tablet"   // ← タブレット
    })
  });
}

function startMic(){
  const S = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!S) return;

  recognition = new S();
  recognition.lang="ja-JP";
  recognition.continuous=true;

  recognition.onresult = e=>{
    const text = e.results[e.results.length-1][0].transcript.trim();
    if(!text) return;
    showText(text);
    sendToSheet(text);
  };

  recognition.onend=()=>{
    if(!micPaused) setTimeout(startMic,500);
  };

  recognition.start();
}

</script>
</body>
</html>
