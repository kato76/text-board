<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>見守り文字ボード</title>
<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:sans-serif;
}
#start{
  width:100vw;
  height:100vh;
  font-size:8vw;
  background:black;
  color:white;
  border:none;
}
#text{
  display:none;
  width:100vw;
  height:100vh;
  font-size:12vw;
  text-align:center;
  padding:5vw;
  line-height:1.2;
  white-space:pre-wrap;
  box-sizing:border-box;
  align-items:center;
  justify-content:center;
}
</style>
</head>
<body>

<button id="start">画面をタップしてください</button>
<div id="text"></div>

<script>
const POST_URL = "https://script.google.com/macros/s/AKfycbxx-MxOyijivaoy2DPi4d1vLTxAHRfdMf8L6d0cDfs7T2ffapxUCiju7mFr1HKmwq9l/exec";
const GET_URL  = "https://script.google.com/macros/s/AKfycbxx-MxOyijivaoy2DPi4d1vLTxAHRfdMf8L6d0cDfs7T2ffapxUCiju7mFr1HKmwq9l/exec";

const IDLE_MESSAGE = "何かしゃべってください。\n2回くらい";
const IDLE_MS = 10 * 60 * 1000; // 10分

let lastId = "";
let recognition = null;
let micPaused = false;
let lastSentText = "";
let lastSentTime = 0;

// 表示状態
let currentMode = "idle"; // idle / wa / tablet
let currentWaText = "";
let currentTabletText = "";
let idleTimer = null;

const startBtn = document.getElementById("start");
const t = document.getElementById("text");

startBtn.onclick = () => {
  startBtn.style.display = "none";
  t.style.display = "flex";
  showIdleMessage();
  startMic();
  pollSheet();
};

function showText(msg){
  t.innerText = msg || "";
}

function showIdleMessage(){
  currentMode = "idle";
  currentTabletText = "";
  showText(IDLE_MESSAGE);
}

function showWaMessage(msg){
  currentMode = "wa";
  currentWaText = msg || "";
  showText(currentWaText);
}

function showTabletMessage(msg){
  currentMode = "tablet";
  currentTabletText = msg || "";
  showText(currentTabletText);
}

function resetIdleTimer(){
  if(idleTimer){
    clearTimeout(idleTimer);
  }

  idleTimer = setTimeout(() => {
    // 10分話していなければ、タブレット発話は消して案内文を表示
    currentTabletText = "";
    showIdleMessage();
  }, IDLE_MS);
}

async function pollSheet(){
  try{
    const res = await fetch(GET_URL + "?t=" + Date.now());
    const data = await res.json();

    // （和）の新しい発言が来たときだけ表示更新
    if(data.id !== undefined && data.id !== lastId){
      lastId = data.id;

      if(data.text){
        // （和）の発言は、タブレットが何かしゃべるまで残す
        showWaMessage(data.text);
      }
    }
  }catch(err){
    console.log("GET error:", err);
  }

  setTimeout(pollSheet, 500);
}

async function sendToSheet(text){
  try{
    await fetch(POST_URL, {
      method: "POST",
      headers: {"Content-Type":"text/plain;charset=utf-8"},
      body: JSON.stringify({
        text: text
      })
    });
  }catch(err){
    console.log("POST error:", err);
  }
}

function startMic(){
  const S = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!S){
    showText("この端末は音声認識に対応していません");
    return;
  }

  recognition = new S();
  recognition.lang = "ja-JP";
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onresult = e => {
    let interimText = "";
    let finalText = "";

    for(let i = e.resultIndex; i < e.results.length; i++){
      const txt = e.results[i][0].transcript.trim();
      if(e.results[i].isFinal){
        finalText += txt;
      }else{
        interimText += txt;
      }
    }

    // 話している途中から表示
    if(interimText){
      showTabletMessage(interimText);
      resetIdleTimer();
    }

    // 確定したら表示してシートに送信
    if(finalText){
      const now = Date.now();
      showTabletMessage(finalText);
      resetIdleTimer();

      if(finalText !== lastSentText || (now - lastSentTime) >= 3000){
        lastSentText = finalText;
        lastSentTime = now;
        sendToSheet(finalText);
      }
    }
  };

  recognition.onerror = e => {
    console.log("Speech error:", e);
  };

  recognition.onend = () => {
    if(!micPaused){
      setTimeout(startMic, 200);
    }
  };

  try{
    recognition.start();
  }catch(err){
    console.log("Recognition start error:", err);
  }
}

// 初期の10分タイマー
resetIdleTimer();
</script>
</body>
</html>
